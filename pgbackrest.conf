# ============================================================
# STANZA CONFIGURATION
# ============================================================

[leadflow]
pg1-host=leadflow-postgres
pg1-port=5432
pg1-user=postgres

# ============================================================
# GLOBAL SETTINGS
# ============================================================

[global]

# ------------------------------------------------------------
# Repository Configuration
# ------------------------------------------------------------
repo1-path=/backups
repo1-type=posix

# ------------------------------------------------------------
# Retention Policy
# ------------------------------------------------------------
repo1-retention-full=7
repo1-retention-diff=14
repo1-retention-archive=14
repo1-retention-archive-type=diff

# ------------------------------------------------------------
# Compression
# ------------------------------------------------------------
compress-type=lz4
compress-level=3

# ------------------------------------------------------------
# Performance Tuning
# ------------------------------------------------------------
process-max=4
buffer-size=4MB
start-fast=y

# ------------------------------------------------------------
# WAL Archiving
# ------------------------------------------------------------
archive-async=y
spool-path=/var/spool/pgbackrest
archive-timeout=600

# ------------------------------------------------------------
# Backup Behavior
# ------------------------------------------------------------
delta=y
hardlink=y

# ------------------------------------------------------------
# Logging
# ------------------------------------------------------------
log-path=/var/log/pgbackrest
log-level-console=info
log-level-file=detail
log-timestamp=y

# ------------------------------------------------------------
# Timeouts
# ------------------------------------------------------------
db-timeout=1800
protocol-timeout=1800

# ------------------------------------------------------------
# Security
# ------------------------------------------------------------
neutral-umask=y