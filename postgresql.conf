# ------------------------------------------------------------
# CONNECTION SETTINGS
# ------------------------------------------------------------

listen_addresses = '*'
port = 5432
max_connections = 200
superuser_reserved_connections = 3

# ------------------------------------------------------------
# MEMORY SETTINGS (ajuste conforme RAM do servidor)
# ------------------------------------------------------------

shared_buffers = 512MB
effective_cache_size = 2GB
work_mem = 8MB
maintenance_work_mem = 256MB

# ------------------------------------------------------------
# WRITE-AHEAD LOG (WAL) - NECESSÁRIO PARA pgBackRest
# ------------------------------------------------------------

wal_level = replica
archive_mode = on
archive_command = 'pgbackrest --stanza=leadflow archive-push %p'
archive_timeout = 60

max_wal_senders = 5
max_replication_slots = 5

wal_keep_size = 512MB
min_wal_size = 512MB
max_wal_size = 2GB

synchronous_commit = on
full_page_writes = on

# ------------------------------------------------------------
# CHECKPOINT SETTINGS
# ------------------------------------------------------------

checkpoint_timeout = 10min
checkpoint_completion_target = 0.9

# ------------------------------------------------------------
# QUERY PLANNER
# ------------------------------------------------------------

random_page_cost = 1.1
effective_io_concurrency = 200

# ------------------------------------------------------------
# AUTOVACUUM (ESSENCIAL PARA MULTI-TENANT)
# ------------------------------------------------------------

autovacuum = on
autovacuum_max_workers = 5
autovacuum_naptime = 10s
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# ------------------------------------------------------------
# LOGGING
# ------------------------------------------------------------

logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 100MB

log_min_duration_statement = 500
log_connections = on
log_disconnections = on
log_checkpoints = on
log_lock_waits = on

log_line_prefix = '%m [%p] %u@%d '

# ------------------------------------------------------------
# SECURITY HARDENING
# ------------------------------------------------------------

password_encryption = scram-sha-256
ssl = off  # Habilite apenas se configurar certificados

# ------------------------------------------------------------
# LOCALE
# ------------------------------------------------------------

datestyle = 'iso, mdy'
timezone = 'UTC'

# ------------------------------------------------------------
# PERFORMANCE SAFETY
# ------------------------------------------------------------

default_statistics_target = 100