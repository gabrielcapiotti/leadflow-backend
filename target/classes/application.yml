spring:
  application:
    name: leadflow-backend
  datasource:
    url: jdbc:postgresql://localhost:2411/leadflow
    username: postgres
    password: venusia
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

server:
  port: 8081
  servlet:
    context-path: /api

security:
  jwt:
    secret: leadflow_ai_backend_jwt_secret_2026_secure_key_minimum_256_bits_required
    expiration: 86400000

logging:
  level:
    root: INFO
