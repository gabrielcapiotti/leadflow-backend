spring:
  application:
    name: leadflow-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8081
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.leadflow: INFO

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 3600000
