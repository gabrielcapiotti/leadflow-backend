spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        multiTenancy: NONE

  flyway:
    enabled: true
    locations:
      - classpath:db/migration/global
      - classpath:db/migration/tenants
    clean-disabled: false

security:
  jwt:
    secret: test-secret-key-test-secret-key
    expiration: 3600000