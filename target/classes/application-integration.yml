spring:
  application:
    name: leadflow-backend-integration

  datasource:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    url: jdbc:tc:postgresql:15:///leadflow_test
    username: test
    password: test
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      auto-commit: false

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        multiTenancy: SCHEMA
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    locations: classpath:db/migration

  sql:
    init:
      mode: never

logging:
  level:
    root: WARN
    "org.hibernate.SQL": DEBUG
    "org.hibernate.orm.jdbc.bind": TRACE
    "org.springframework.test.context": INFO
    "org.springframework.security": WARN

security:
  jwt:
    secret: "01234567890123456789012345678901"
    expiration: 3600000
    issuer: leadflow-integration

multitenancy:
  enabled: true