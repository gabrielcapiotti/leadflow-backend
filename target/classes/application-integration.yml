spring:
  application:
    name: leadflow-backend

  datasource:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    url: jdbc:tc:postgresql:15:///leadflow_test
    username: postgres
    password: postgres

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        multiTenancy: SCHEMA
        jdbc:
          time_zone: UTC

  flyway:
    enabled: false   # Usando create-drop nos testes

  sql:
    init:
      mode: never

logging:
  level:
    root: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.test.context: INFO
    org.springframework.security: WARN

security:
  jwt:
    secret: integration-secret-key-with-at-least-32-characters-long-12345
    expiration: 3600000
    issuer: leadflow-integration

multitenancy:
  enabled: true

server:
  port: 0