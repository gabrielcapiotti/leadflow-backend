spring:
  datasource:
    url: jdbc:postgresql://localhost:2411/leadflow_test  # URL do banco de dados
    username: postgres  # Usuário do banco
    password: venusia  # Senha do banco
  jpa:
    hibernate:
      ddl-auto: validate  
    show-sql: false  
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect  
        "[format_sql]": true  
  flyway:
    enabled: true  
    baseline-on-migrate: true  
    validate-on-migrate: true  
    locations: classpath:db/migration  

multitenancy:
  enabled: true  