spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: false
    validate-on-migrate: true
    baseline-on-migrate: true
    locations: classpath:db/migration

security:
  jwt:
    secret: "mysecretkeythatismorethan32characterslong"
    expiration: 3600000
