spring:

  application:
    name: leadflow-backend-test

  datasource:
    url: jdbc:tc:postgresql:15:///leadflow_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      auto-commit: false

  sql:
    init:
      mode: never

  flyway:
    enabled: false

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        multiTenancy: SCHEMA
        jdbc:
          lob:
            non_contextual_creation: true

  task:
    scheduling:
      enabled: false

sendgrid:
  api-key: test-sendgrid-api-key
  from-email: no-reply@test.local
  webhook:
    verify-signature: false
    public-key: test-public-key
  retry:
    max-attempts: 2
    initial-backoff-ms: 10
    multiplier: 2.0
    worker:
      max-attempts: 3
      delay-seconds: 1
      fixed-delay-ms: 1000

stripe:
  api:
    secret-key: sk_test_dummy
  webhook:
    secret: test_webhook_secret

logging:
  level:
    root: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.test: WARN

security:
  jwt:
    secret: 0123456789abcdef0123456789abcdef0123456789abcdef
    expiration: 3600000
  rate-limit:
    enabled: false

multitenancy:
  enabled: true

openai:
  api:
    key: test-key
  retry:
    max-attempts: 2
    initial-backoff-ms: 10
    multiplier: 2.0

subscription:
  limits:
    active-leads: 500
    ai-executions: 1000