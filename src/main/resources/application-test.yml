spring:

  application:
    name: leadflow-backend-test

  datasource:
    url: jdbc:tc:postgresql:15:///leadflow_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test

    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      auto-commit: false

  jpa:

    open-in-view: false

    hibernate:
      ddl-auto: create-drop

    properties:
      hibernate:

        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

        # Multi-tenant configuration
        multiTenancy: SCHEMA

        jdbc:
          lob:
            non_contextual_creation: true

  flyway:
    enabled: false

  sql:
    init:
      mode: never

logging:

  level:
    root: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

multitenancy:
  enabled: true

sendgrid:

  api-key: test-sendgrid-api-key
  from-email: no-reply@test.local

  webhook:
    verify-signature: false
    public-key: test-public-key

  retry:

    max-attempts: 2
    initial-backoff-ms: 10
    multiplier: 2.0

    worker:
      max-attempts: 3
      delay-seconds: 1
      fixed-delay-ms: 1000