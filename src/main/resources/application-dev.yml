spring:
  application:
    name: leadflow-backend

  datasource:
    url: jdbc:postgresql://localhost:2411/leadflow
    username: postgres
    password: venusia

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        multiTenancy: SCHEMA

  flyway:
    enabled: true
    locations:
      - classpath:db/migration/global
      - classpath:db/migration/tenants

logging:
  level:
    root: INFO
    com.leadflow: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

server:
  port: 8081
  servlet:
    context-path: /api

multitenancy:
  enabled: true

security:
  jwt:
    secret: integration-secret-key
    expiration: 3600000