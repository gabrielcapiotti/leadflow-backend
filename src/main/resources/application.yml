spring:
  application:
    name: leadflow-backend

  datasource:
    url: jdbc:postgresql://localhost:2411/leadflow
    username: postgres
    password: venusia
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        multiTenancy: SCHEMA
        multi_tenant_connection_provider: com.leadflow.backend.multitenancy.provider.SchemaMultiTenantConnectionProvider
        tenant_identifier_resolver: com.leadflow.backend.multitenancy.identifier.CurrentTenantIdentifierResolverImpl

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    '[com.leadflow]': INFO
    '[org.hibernate.SQL]': DEBUG
    '[org.hibernate.orm.jdbc.bind]': TRACE

security:
  jwt:
    secret: "leadflow-super-secret-key-2026-ultra-secure"
    expiration: 3600000
  filter:
    order:
      tenantFilter: BEFORE UsernamePasswordAuthenticationFilter
