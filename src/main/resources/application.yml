spring:
  application:
    name: leadflow-backend

  datasource:
    url: jdbc:postgresql://localhost:2411/leadflow_test  # Verifique se a porta está correta
    username: postgres
    password: venusia
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      auto-commit: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate  # Altere para 'update' se necessário em ambiente de desenvolvimento
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        multiTenancy: SCHEMA
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    locations:
      - classpath:db/migration/global
      - classpath:db/migration/tenants
    spring:
      flyway:
        enabled: true
        locations: classpath:db/migration

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.leadflow: DEBUG
    org.hibernate.SQL: DEBUG  # Mude para 'INFO' em produção
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

security:
  jwt:
    secret: ${JWT_SECRET:01234567890123456789012345678901}  # Preferência por variável de ambiente
    expiration: ${JWT_EXPIRATION:3600000}
  session:
    max-devices: 3
    cleanup-days: 30
  brute-force:
    max-attempts: 5
    window-minutes: 5

openai:
  api:
    key: ${OPENAI_API_KEY}
