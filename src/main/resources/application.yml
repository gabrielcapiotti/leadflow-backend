spring:
  application:
    name: leadflow-backend

  datasource:
    url: jdbc:postgresql://localhost:2411/leadflow
    username: postgres
    password: venusia

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        multiTenancy: SCHEMA
        # Para Hibernate 6, não é necessário ter "multi_tenancy" como propriedade extra.
        multiTenantConnectionProviderClass: com.leadflow.backend.multitenancy.config.MultiTenantConnectionProvider
        currentTenantIdentifierResolverClass: com.leadflow.backend.multitenancy.context.TenantContextResolver

  flyway:
    enabled: true
    locations:
      - classpath:db/migration/global
      - classpath:db/migration/tenants
    schemas:
      - public
      # Apenas o schema do tenant específico que será usado na migração
      # Você pode incluir outros schemas dos tenants conforme necessário

server:
  port: 8081
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.leadflow: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

security:
  jwt:
    secret: integration-secret-key
    expiration: 3600000

multitenancy:
  enabled: true
