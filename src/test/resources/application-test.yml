spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  flyway:
    enabled: false

server:
  ssl:
    enabled: false

security:
  jwt:
    secret: test-secret-key-minimum-256-bits-required-for-testing
    expiration: 3600000

logging:
  level:
    root: ERROR
