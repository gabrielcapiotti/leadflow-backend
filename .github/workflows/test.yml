name: Tests

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: leadflow_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn test -DskipIntegrationTests
        env:
          MAVEN_OPTS: -Xmx1024m
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/leadflow_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379

      - name: Run integration tests
        run: mvn test -DincludeIntegrationTests
        env:
          MAVEN_OPTS: -Xmx1024m
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/leadflow_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379

      - name: Generate test report
        if: always()
        run: |
          mvn surefire-report:report
          mkdir -p test-reports
          cp -r target/site/surefire-report.html test-reports/ || true
          cp -r target/surefire-reports/*.txt test-reports/ || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: test-reports/
          retention-days: 30

      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./target/site/jacoco/jacoco.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const testResults = fs.readdirSync('./test-reports/')
              .filter(f => f.endsWith('.txt'))
              .map(f => fs.readFileSync(`./test-reports/${f}`, 'utf8'))
              .join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Test Results\n\n```\n' + testResults.substring(0, 2000) + '\n```'
            });

      - name: Notify on test failure
        if: failure()
        run: |
          echo "::error::Tests failed! Check the logs above."
          exit 1
